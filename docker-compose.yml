services:
  api:
    build: ./api
    restart: unless-stopped

    # Expongo SOLO la API hacia mi PC
    ports:
      - "8000:8000"

    env_file:
      - .env

    # ------------------------------------------------------------------
    # VOLUMEN DE DESARROLLO
    # ------------------------------------------------------------------
    # Montamos el código fuente del host directamente sobre /app/app.
    # Así los cambios en los .py se reflejan sin reconstruir la imagen.
    #
    # :ro  → el contenedor SOLO puede leer el código, nunca modificarlo.
    #        Consistente con read_only:true — mínimo privilegio.
    # ------------------------------------------------------------------
    volumes:
      - ./api/api_app:/app/app:ro

    # ------------------------------------------------------------------
    # COMANDO CON HOT-RELOAD
    # ------------------------------------------------------------------
    # --reload          activa reinicio automático al detectar cambios
    # --reload-dir      limita la vigilancia solo a /app/app (no escanea
    #                   todo el sistema de ficheros, más eficiente y seguro)
    # PYTHONDONTWRITEBYTECODE=1 ya está en el Dockerfile, así que uvicorn
    # no intentará escribir .pyc en el filesystem de solo lectura.
    # ------------------------------------------------------------------
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/app

    # =========================
    # HARDENING (SEGURIDAD)
    # =========================
    # Se mantiene todo intacto:
    # - read_only:true  → filesystem inmutable salvo /tmp
    # - no-new-privileges → el proceso no puede escalar privilegios
    # - cap_drop ALL    → sin capacidades de root
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    # Límites (compose clásico)
    cpus: "0.50"
    mem_limit: "256m"

  db:
    image: postgres:15-alpine
    restart: unless-stopped

    env_file:
      - .env

    volumes:
      # Persistencia real de la BD
      - beermap_postgres_data:/var/lib/postgresql/data

      # IMPORTANTE: ejecuta los scripts al crear la BD por primera vez
      - ./api/db:/docker-entrypoint-initdb.d:ro

    # No expongo Postgres al exterior (solo red interna Docker)
    # ports:
    #   - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped

    command: ["redis-server", "--appendonly", "yes"]

    volumes:
      - beermap_redis_data:/data

    # No expongo Redis al exterior
    # ports:
    #   - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:4
    restart: unless-stopped

    ports:
      - "8081:8080"

    depends_on:
      db:
        condition: service_healthy

volumes:
  beermap_postgres_data:
  beermap_redis_data: